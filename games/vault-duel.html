<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ثنائي الخزنة — لعبة تخمين الأرقام</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&family=Big+Shoulders+Stencil:wght@500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#14110D;
    --panel:#1C1712;
    --panel-alt:#241D15;
    --brass:#C9A227;
    --brass-bright:#F0C24B;
    --copper:#B5651D;
    --text:#EDE6D6;
    --text-muted:#948C7B;
    --success:#7A9B6E;
    --danger:#B5524A;
    --border: rgba(201,162,39,0.25);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(circle at 50% -10%, #2a2014 0%, var(--bg) 55%),
      repeating-linear-gradient(45deg, rgba(255,255,255,0.012) 0px, rgba(255,255,255,0.012) 2px, transparent 2px, transparent 6px);
    color:var(--text);
    font-family:'Tajawal', sans-serif;
    min-height:100vh;
    direction:rtl;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:28px 16px 60px;
  }
  .digits{font-family:'Big Shoulders Stencil', sans-serif; direction:ltr; display:inline-block;}
  .wrap{width:100%;max-width:560px;}

  header.top{text-align:center;margin-bottom:22px;}
  header.top .badge{
    display:inline-flex;align-items:center;gap:8px;
    color:var(--brass);
    font-size:13px;letter-spacing:2px;
    border:1px solid var(--border);
    padding:4px 14px;border-radius:99px;
    margin-bottom:14px;
  }
  header.top h1{
    font-size:34px;margin:0 0 6px;
    color:var(--text);
    font-weight:900;
  }
  header.top h1 span{color:var(--brass-bright);}
  header.top p{color:var(--text-muted);margin:0;font-size:14.5px;}

  .card{
    background:linear-gradient(180deg, var(--panel-alt), var(--panel));
    border:1px solid var(--border);
    border-radius:18px;
    padding:24px;
    margin-bottom:18px;
    box-shadow: 0 14px 40px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.03);
  }
  .card h2{
    font-size:16px;margin:0 0 16px;color:var(--brass-bright);
    display:flex;align-items:center;gap:8px;font-weight:700;
  }
  .card h2::before{content:'';width:6px;height:6px;background:var(--brass);border-radius:50%;flex:none;}

  label{display:block;font-size:13px;color:var(--text-muted);margin:0 0 6px;}
  input[type=text], input[type=number]{
    width:100%;
    background:#0F0C09;
    border:1px solid var(--border);
    color:var(--text);
    border-radius:10px;
    padding:12px 14px;
    font-size:16px;
    font-family:'Tajawal',sans-serif;
    margin-bottom:14px;
    outline:none;
    transition:border-color .15s;
  }
  input:focus{border-color:var(--brass);}
  .row2{display:flex;gap:12px;}
  .row2 > div{flex:1;}

  button{
    font-family:'Tajawal',sans-serif;
    font-weight:700;
    font-size:15px;
    border:none;
    border-radius:10px;
    padding:13px 18px;
    cursor:pointer;
    width:100%;
    transition:transform .1s, filter .15s, opacity .15s;
  }
  button:active{transform:scale(0.98);}
  button:disabled{opacity:.4;cursor:not-allowed;}
  .btn-primary{
    background:linear-gradient(180deg, var(--brass-bright), var(--brass));
    color:#1A1408;
  }
  .btn-primary:hover:not(:disabled){filter:brightness(1.08);}
  .btn-ghost{
    background:transparent;
    color:var(--brass-bright);
    border:1px solid var(--border);
  }
  .btn-ghost:hover{border-color:var(--brass);}
  .btn-row{display:flex;gap:10px;}

  .tabs{display:flex;gap:8px;margin-bottom:18px;}
  .tab{
    flex:1;text-align:center;padding:11px;border-radius:10px;
    border:1px solid var(--border);color:var(--text-muted);cursor:pointer;
    font-weight:700;font-size:14px;
  }
  .tab.active{background:var(--brass);color:#1A1408;border-color:var(--brass);}

  .code-display{
    text-align:center;padding:18px 0 6px;
  }
  .code-display .digits{
    font-size:26px;letter-spacing:2px;color:var(--brass-bright);
    word-break:break-all;line-height:1.3;padding:0 6px;
  }
  .code-display .hint{font-size:12.5px;color:var(--text-muted);margin-top:6px;}
  .copy-btn{margin-top:14px;}

  .players-list{display:flex;flex-direction:column;gap:8px;margin-bottom:6px;}
  .player-chip{
    display:flex;align-items:center;justify-content:space-between;
    background:#0F0C09;border:1px solid var(--border);
    padding:10px 14px;border-radius:10px;font-size:14.5px;
  }
  .player-chip .you{color:var(--brass-bright);font-size:12px;}
  .pulse{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--success);
    box-shadow:0 0 0 0 rgba(122,155,110,.6);animation:pulse 1.6s infinite;}
  @keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(122,155,110,.55);}
    70%{box-shadow:0 0 0 9px rgba(122,155,110,0);}
    100%{box-shadow:0 0 0 0 rgba(122,155,110,0);}
  }

  /* Scoreboard */
  .scoreboard{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
  .score-side{text-align:center;flex:1;}
  .score-side .name{font-size:13.5px;color:var(--text-muted);margin-bottom:4px;}
  .score-side .val{font-size:26px;color:var(--brass-bright);}
  .score-side.turn .name{color:var(--brass-bright);}
  .vs{color:var(--copper);font-weight:900;font-size:13px;padding:0 12px;}
  .round-pill{
    text-align:center;font-size:12.5px;color:var(--text-muted);
    margin-bottom:16px;letter-spacing:1px;
  }

  /* Dial */
  .dial-wrap{display:flex;justify-content:center;margin:6px 0 18px;}
  svg{display:block;}
  .dial-readout{font-size:54px;color:var(--text);text-anchor:middle;font-weight:700;}
  .dial-status{font-size:13px;letter-spacing:2px;}

  .hint-banner{
    text-align:center;padding:10px;border-radius:10px;margin-bottom:16px;
    font-weight:700;font-size:15px;border:1px solid var(--border);
  }
  .hint-higher{color:var(--brass-bright);}
  .hint-lower{color:var(--copper);}
  .hint-correct{color:var(--success);border-color:rgba(122,155,110,.4);background:rgba(122,155,110,.08);}
  .hint-wait{color:var(--text-muted);}

  .history{max-height:140px;overflow-y:auto;display:flex;flex-direction:column-reverse;gap:6px;margin-top:4px;}
  .history-row{
    display:flex;justify-content:space-between;align-items:center;
    background:#0F0C09;border:1px solid var(--border);
    padding:7px 12px;border-radius:8px;font-size:13px;color:var(--text-muted);
  }
  .history-row .num{color:var(--text);font-weight:700;}
  .history-row .tag{font-size:11.5px;padding:2px 8px;border-radius:99px;}
  .tag-higher{background:rgba(240,194,75,.12);color:var(--brass-bright);}
  .tag-lower{background:rgba(181,101,29,.18);color:#D88C4B;}
  .tag-correct{background:rgba(122,155,110,.18);color:var(--success);}

  .empty-state{text-align:center;color:var(--text-muted);font-size:13.5px;padding:14px 0;}

  .finished-trophy{text-align:center;font-size:48px;margin-bottom:6px;}
  .finished-title{text-align:center;font-size:22px;font-weight:900;color:var(--brass-bright);margin-bottom:4px;}
  .finished-sub{text-align:center;color:var(--text-muted);font-size:14px;margin-bottom:18px;}

  .error-msg{color:var(--danger);font-size:13px;margin:-6px 0 12px;min-height:0;}
  .small-link{display:block;text-align:center;color:var(--text-muted);font-size:12.5px;margin-top:8px;cursor:pointer;}
  .small-link:hover{color:var(--brass-bright);}

  @media (max-width: 420px){
    .code-display .digits{font-size:20px;letter-spacing:1px;}
    header.top h1{font-size:27px;}
  }

  @keyframes confettiFall{
    0%{transform:translateY(-20px) rotate(0deg); opacity:1;}
    100%{transform:translateY(220px) rotate(540deg); opacity:0;}
  }
  .confetti-piece{
    position:absolute;top:0;width:8px;height:8px;border-radius:2px;
    animation:confettiFall 1.4s ease-in forwards;
  }
</style>
<script src="../confetti.js"></script>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="badge">🔐 غرفة سرية لشخصين</div>
    <h1>ثنائي <span>الخزنة</span></h1>
    <p>اكسر الكود قبل خصمك — العب مع صديقك من أي مكان</p>
  </header>
  <a class="small-link" href="../index.html" style="margin-bottom:14px;">→ العودة لصندوق الألعاب</a>
  <div id="app"></div>
</div>

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script>
// ==================================================================
// Vault Duel — peer-to-peer (WebRTC via PeerJS), no backend server.
// Host and guest connect directly; game messages travel over the
// PeerJS data connection. PeerJS's public cloud broker is only used
// briefly to negotiate the connection (signaling), not to store data.
// ==================================================================

// STUN discovers your public address for direct P2P; TURN relays traffic
// when direct P2P is blocked (mobile carriers, office/school Wi-Fi, some
// home routers). Without TURN, connections across such networks fail
// silently with a generic "no response" error.
const PEER_ICE_CONFIG = {
  iceServers: [
    { urls: 'stun:stun.l.google.com:19302' },
    { urls: 'stun:stun1.l.google.com:19302' },
    { urls: 'stun:openrelay.metered.ca:80' },
    { urls: 'turn:openrelay.metered.ca:80', username: 'openrelayproject', credential: 'openrelayproject' },
    { urls: 'turn:openrelay.metered.ca:443', username: 'openrelayproject', credential: 'openrelayproject' },
    { urls: 'turn:openrelay.metered.ca:443?transport=tcp', username: 'openrelayproject', credential: 'openrelayproject' },
  ]
};

let state = {
  mode: null,           // 'local' | 'remote' — chosen via entry modal
  screen: 'home',      // home | local_setup | lobby | game | finished
  tab: 'create',
  myName: '',
  myRole: null,         // 'A' (host) or 'B' (guest) — null in local mode
  isHost: false,
  peer: null,
  conn: null,
  roomCode: null,       // host's PeerJS id, shared with the friend
  room: null,           // mirrored game state, see freshRoomConfig()
  secretLocal: null,    // only the current setter's client knows this
  error: '',
  busy: false,
};

function uid(){ return Math.random().toString(36).slice(2,10); }
function escapeHtml(s){
  return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function freshRoomConfig(min, max, rounds){
  return {
    min, max, rounds,
    players: [],
    status: 'waiting',       // waiting | setting | guessing | round_end | finished
    currentRound: 1,
    setterRole: 'A',
    guesses: [],
    attemptsThisRound: 0,
    scores: {A: 0, B: 0},
    winnerRole: null,
    secret: null,             // only populated for display once revealed
  };
}

// ---------------- connection plumbing ----------------
function setupConnHandlers(conn){
  conn.on('data', handleMessage);
  conn.on('close', () => {
    state.error = 'انقطع الاتصال بصديقك. حاول إعادة إنشاء أو الانضمام للغرفة من جديد';
    render();
  });
  conn.on('error', (err) => {
    state.error = 'خطأ في الاتصال (' + (err?.type || err?.message || 'غير معروف') + ')';
    render();
  });
}

function nameOf(role){
  const p = state.room?.players.find(pl => pl.role === role);
  return p ? p.name : '...';
}

// ---------------- host flow ----------------
function createRoom(){
  if(state.busy) return;
  if(!state.myName.trim()){ state.error = 'الرجاء إدخال اسمك أولاً'; render(); return; }
  const min = parseInt(document.getElementById('minInput')?.value || '1');
  const max = parseInt(document.getElementById('maxInput')?.value || '100');
  const rounds = parseInt(document.getElementById('roundsInput')?.value || '5');
  if(isNaN(min) || isNaN(max) || min >= max){ state.error = 'تأكد أن الحد الأدنى أقل من الحد الأعلى'; render(); return; }

  state.busy = true; state.error = ''; render();
  state.isHost = true;
  state.myRole = 'A';
  state.room = freshRoomConfig(min, max, rounds);
  state.room.players.push({name: state.myName.trim(), role: 'A'});

  try{
    state.peer = new Peer(undefined, {config: PEER_ICE_CONFIG});
  }catch(e){
    state.busy = false;
    state.error = 'تعذر تشغيل نظام الاتصال (' + (e.message || 'غير معروف') + ')';
    render(); return;
  }

  state.peer.on('open', (id) => {
    state.roomCode = id;
    state.busy = false;
    state.screen = 'lobby';
    render();
  });

  state.peer.on('error', (err) => {
    state.busy = false;
    state.error = 'تعذر إنشاء الغرفة (' + (err?.type || 'خطأ غير معروف') + ')';
    render();
  });

  state.peer.on('connection', (conn) => {
    if(state.conn){ conn.close(); return; } // room already has a guest
    state.conn = conn;
    setupConnHandlers(conn);
  });
}

// ---------------- guest flow ----------------
function joinRoom(){
  if(state.busy) return;
  if(!state.myName.trim()){ state.error = 'الرجاء إدخال اسمك أولاً'; render(); return; }
  const codeInput = document.getElementById('joinCodeInput');
  const hostId = (codeInput?.value || '').trim();
  if(!hostId){ state.error = 'الرجاء إدخال كود الغرفة'; render(); return; }

  state.busy = true; state.error = ''; render();
  state.isHost = false;
  state.myRole = 'B';

  try{
    state.peer = new Peer(undefined, {config: PEER_ICE_CONFIG});
  }catch(e){
    state.busy = false;
    state.error = 'تعذر تشغيل نظام الاتصال (' + (e.message || 'غير معروف') + ')';
    render(); return;
  }

  state.peer.on('error', (err) => {
    state.busy = false;
    state.error = 'تعذر الاتصال بالغرفة (' + (err?.type || 'خطأ غير معروف') + '). تأكد من صحة الكود';
    render();
  });

  state.peer.on('open', () => {
    const conn = state.peer.connect(hostId, {reliable: true});
    state.conn = conn;
    setupConnHandlers(conn);
    conn.on('open', () => {
      conn.send({type: 'join', name: state.myName.trim()});
    });
    // safety timeout in case host never responds
    setTimeout(() => {
      if(state.busy && state.screen === 'home'){
        state.busy = false;
        state.error = 'لم يتم الرد خلال 20 ثانية. تأكد من صحة الكود، وأن صديقك لم يُحدّث صفحته بعد مشاركة الكود (كل تحديث للصفحة يُنشئ كوداً جديداً)، وجرّب شبكة إنترنت أخرى إن استمرت المشكلة';
        render();
      }
    }, 20000);
  });
}

// ---------------- message handling ----------------
function handleMessage(msg){
  if(!msg || !msg.type) return;

  if(msg.type === 'join' && state.isHost){
    state.room.players.push({name: msg.name, role: 'B'});
    state.room.status = 'setting';
    state.conn.send({type: 'welcome', room: state.room});
    state.screen = 'game';
    state.busy = false;
    render();
    return;
  }

  if(msg.type === 'welcome' && !state.isHost){
    state.room = msg.room;
    state.screen = 'game';
    state.busy = false;
    render();
    return;
  }

  if(msg.type === 'secretSet'){
    state.room.status = 'guessing';
    state.room.attemptsThisRound = 0;
    render();
    return;
  }

  if(msg.type === 'guess'){
    // Only the current setter's client holds the secret and can judge this
    const val = msg.value;
    state.room.attemptsThisRound += 1;
    let hint;
    if(val === state.secretLocal) hint = 'correct';
    else if(val < state.secretLocal) hint = 'higher';
    else hint = 'lower';
    state.room.guesses.push({by: msg.by, value: val, hint, round: state.room.currentRound});

    if(hint === 'correct'){
      state.room.scores[msg.by] += state.room.attemptsThisRound;
      if(state.room.currentRound >= state.room.rounds){
        state.room.status = 'finished';
        const a = state.room.scores.A, b = state.room.scores.B;
        state.room.winnerRole = a === b ? 'tie' : (a < b ? 'A' : 'B');
      } else {
        state.room.status = 'round_end';
      }
    }

    state.conn.send({
      type: 'result',
      guesses: state.room.guesses,
      status: state.room.status,
      attemptsThisRound: state.room.attemptsThisRound,
      scores: state.room.scores,
      winnerRole: state.room.winnerRole,
      secret: hint === 'correct' ? state.secretLocal : undefined,
    });

    if(state.room.status === 'finished') state.screen = 'finished';
    render();
    return;
  }

  if(msg.type === 'result'){
    state.room.guesses = msg.guesses;
    state.room.status = msg.status;
    state.room.attemptsThisRound = msg.attemptsThisRound;
    state.room.scores = msg.scores;
    state.room.winnerRole = msg.winnerRole;
    if(msg.secret !== undefined) state.room.secret = msg.secret;
    state.busy = false;
    if(state.room.status === 'finished') state.screen = 'finished';
    render();
    return;
  }

  if(msg.type === 'requestNextRound' && state.isHost){
    hostAdvanceRound();
    return;
  }

  if(msg.type === 'nextRound'){
    state.room = msg.room;
    state.secretLocal = null;
    state.busy = false;
    render();
    return;
  }
}

// ---------------- game actions ----------------
function submitSecret(){
  if(state.busy) return;
  const val = parseInt(document.getElementById('secretInput')?.value);
  const room = state.room;
  if(isNaN(val) || val < room.min || val > room.max){
    state.error = `أدخل رقماً بين ${room.min} و ${room.max}`;
    render(); return;
  }
  state.secretLocal = val;
  room.status = 'guessing';
  room.attemptsThisRound = 0;
  state.error = '';
  try{
    state.conn.send({type: 'secretSet'});
  }catch(e){
    state.error = 'تعذر إرسال البيانات لصديقك، تأكد من استمرار الاتصال';
  }
  render();
}

function submitGuess(){
  if(state.busy) return;
  const room = state.room;
  const input = document.getElementById('guessInput');
  const val = parseInt(input?.value);
  if(isNaN(val) || val < room.min || val > room.max){
    state.error = `أدخل رقماً بين ${room.min} و ${room.max}`;
    render(); return;
  }
  state.error = '';
  state.busy = true;
  try{
    state.conn.send({type: 'guess', value: val, by: state.myRole});
    if(input) input.value = '';
  }catch(e){
    state.busy = false;
    state.error = 'تعذر إرسال التخمين، تأكد من استمرار الاتصال';
  }
  render();
}

function hostAdvanceRound(){
  const room = state.room;
  room.currentRound += 1;
  room.setterRole = room.setterRole === 'A' ? 'B' : 'A';
  room.secret = null;
  room.attemptsThisRound = 0;
  room.status = 'setting';
  state.secretLocal = null;
  try{
    state.conn.send({type: 'nextRound', room});
  }catch(e){}
  state.busy = false;
  render();
}

function nextRound(){
  if(state.busy) return;
  state.busy = true; render();
  if(state.isHost){
    hostAdvanceRound();
  } else {
    try{
      state.conn.send({type: 'requestNextRound'});
    }catch(e){
      state.busy = false;
      state.error = 'تعذر إرسال الطلب، تأكد من استمرار الاتصال';
      render();
    }
  }
}

function leaveRoom(){
  try{ state.conn && state.conn.close(); }catch(e){}
  try{ state.peer && state.peer.destroy(); }catch(e){}
  state = {
    mode: null, screen: 'home', tab: 'create', myName: '', myRole: null, isHost: false,
    peer: null, conn: null, roomCode: null, room: null, secretLocal: null,
    error: '', busy: false,
  };
  render();
}

// ---------------- local pass-and-play mode ----------------
function chooseMode(mode){
  state.mode = mode;
  state.screen = mode === 'local' ? 'local_setup' : 'home';
  render();
}

function localStartGame(){
  const n1 = document.getElementById('localP1Input')?.value.trim();
  const n2 = document.getElementById('localP2Input')?.value.trim();
  const min = parseInt(document.getElementById('minInput')?.value || '1');
  const max = parseInt(document.getElementById('maxInput')?.value || '100');
  const rounds = parseInt(document.getElementById('roundsInput')?.value || '5');
  if(!n1 || !n2){ state.error = 'الرجاء إدخال اسمي اللاعبين'; render(); return; }
  if(isNaN(min) || isNaN(max) || min >= max){ state.error = 'تأكد أن الحد الأدنى أقل من الحد الأعلى'; render(); return; }

  state.room = freshRoomConfig(min, max, rounds);
  state.room.players.push({name: n1, role: 'A'});
  state.room.players.push({name: n2, role: 'B'});
  state.room.status = 'setting';
  state.myRole = null;
  state.error = '';
  state.screen = 'game';
  render();
}

function localSubmitSecret(){
  const val = parseInt(document.getElementById('secretInput')?.value);
  const room = state.room;
  if(isNaN(val) || val < room.min || val > room.max){
    state.error = `أدخل رقماً بين ${room.min} و ${room.max}`;
    render(); return;
  }
  state.secretLocal = val;
  room.status = 'pass_to_guesser';
  state.error = '';
  render();
}

function localProceedToGuess(){
  state.room.status = 'guessing';
  state.room.attemptsThisRound = 0;
  render();
}

function localSubmitGuess(){
  const room = state.room;
  const input = document.getElementById('guessInput');
  const val = parseInt(input?.value);
  if(isNaN(val) || val < room.min || val > room.max){
    state.error = `أدخل رقماً بين ${room.min} و ${room.max}`;
    render(); return;
  }
  room.attemptsThisRound += 1;
  const guesserRole = room.setterRole === 'A' ? 'B' : 'A';
  let hint;
  if(val === state.secretLocal) hint = 'correct';
  else if(val < state.secretLocal) hint = 'higher';
  else hint = 'lower';
  room.guesses.push({by: guesserRole, value: val, hint, round: room.currentRound});

  if(hint === 'correct'){
    room.scores[guesserRole] += room.attemptsThisRound;
    room.secret = state.secretLocal;
    if(room.currentRound >= room.rounds){
      room.status = 'finished';
      const a = room.scores.A, b = room.scores.B;
      room.winnerRole = a === b ? 'tie' : (a < b ? 'A' : 'B');
      state.screen = 'finished';
    } else {
      room.status = 'round_end';
    }
  }
  state.error = '';
  if(input) input.value = '';
  render();
}

function localNextRound(){
  const room = state.room;
  room.currentRound += 1;
  room.setterRole = room.setterRole === 'A' ? 'B' : 'A';
  room.secret = null;
  room.attemptsThisRound = 0;
  room.status = 'setting';
  state.secretLocal = null;
  render();
}

function localPlayAgain(){
  state.screen = 'local_setup';
  state.room = null;
  state.secretLocal = null;
  state.error = '';
  render();
}

function dialSVG(room){
  const min = room.min, max = room.max;
  const lastGuess = [...room.guesses].reverse().find(g => g.round === room.currentRound);
  let frac = 0.5;
  let readout = '?';
  let statusColor = 'var(--text-muted)';
  if(lastGuess){
    frac = (lastGuess.value - min) / (max - min);
    readout = lastGuess.value;
    if(lastGuess.hint === 'correct') statusColor = 'var(--success)';
    else statusColor = 'var(--brass-bright)';
  }
  const startAngle = -225, endAngle = 45;
  const angle = startAngle + frac * (endAngle - startAngle);
  const rad = angle * Math.PI / 180;
  const cx = 140, cy = 140, r = 105;
  const nx = cx + r * Math.cos(rad);
  const ny = cy + r * Math.sin(rad);

  let ticks = '';
  for(let i=0;i<=10;i++){
    const ta = startAngle + (i/10) * (endAngle - startAngle);
    const tr = ta * Math.PI/180;
    const r1 = 122, r2 = i%5===0 ? 108 : 114;
    const x1 = cx + r1*Math.cos(tr), y1 = cy + r1*Math.sin(tr);
    const x2 = cx + r2*Math.cos(tr), y2 = cy + r2*Math.sin(tr);
    ticks += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="var(--brass)" stroke-width="${i%5===0?2:1}" opacity="${i%5===0?0.8:0.35}"/>`;
  }

  return `
  <svg viewBox="0 0 280 280" width="240" height="240">
    <circle cx="140" cy="140" r="132" fill="none" stroke="var(--border)" stroke-width="1"/>
    <circle cx="140" cy="140" r="100" fill="#0F0C09" stroke="var(--brass)" stroke-width="1.5" opacity="0.5"/>
    ${ticks}
    <text x="140" y="135" text-anchor="middle" class="dial-readout digits" fill="${statusColor}">${readout}</text>
    <text x="140" y="160" text-anchor="middle" class="dial-status" fill="var(--text-muted)">${min} – ${max}</text>
    <line x1="${cx}" y1="${cy}" x2="${nx}" y2="${ny}" stroke="var(--copper)" stroke-width="3" stroke-linecap="round"/>
    <circle cx="${cx}" cy="${cy}" r="6" fill="var(--brass-bright)"/>
  </svg>
  `;
}

function render(){
  const app = document.getElementById('app');
  if(!app) return;
  let html = '';
  if(state.mode === null) html = renderModeModal();
  else if(state.screen === 'local_setup') html = renderLocalSetup();
  else if(state.screen === 'home') html = renderHome();
  else if(state.screen === 'lobby') html = renderLobby();
  else if(state.screen === 'game') html = state.mode === 'local' ? renderLocalGame() : renderGame();
  else if(state.screen === 'finished') html = state.mode === 'local' ? renderLocalFinished() : renderFinished();
  app.innerHTML = html;

  const nameInput = document.getElementById('nameInput');
  if(nameInput) nameInput.addEventListener('input', e => state.myName = e.target.value);
}

function setTab(t){ state.tab = t; state.error=''; render(); }

function copyCode(){
  const code = state.roomCode;
  if(!code) return;
  navigator.clipboard?.writeText(code).catch(()=>{});
  const btn = document.querySelector('.copy-btn');
  if(btn){ const old = btn.textContent; btn.textContent = 'تم النسخ ✓'; setTimeout(()=>{btn.textContent = old;}, 1500); }
}
