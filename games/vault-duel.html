<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ثنائي الخزنة — لعبة تخمين الأرقام</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&family=Big+Shoulders+Stencil:wght@500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#14110D;
    --panel:#1C1712;
    --panel-alt:#241D15;
    --brass:#C9A227;
    --brass-bright:#F0C24B;
    --copper:#B5651D;
    --text:#EDE6D6;
    --text-muted:#948C7B;
    --success:#7A9B6E;
    --danger:#B5524A;
    --border: rgba(201,162,39,0.25);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(circle at 50% -10%, #2a2014 0%, var(--bg) 55%),
      repeating-linear-gradient(45deg, rgba(255,255,255,0.012) 0px, rgba(255,255,255,0.012) 2px, transparent 2px, transparent 6px);
    color:var(--text);
    font-family:'Tajawal', sans-serif;
    min-height:100vh;
    direction:rtl;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:28px 16px 60px;
  }
  .digits{font-family:'Big Shoulders Stencil', sans-serif; direction:ltr; display:inline-block;}
  .wrap{width:100%;max-width:560px;}

  header.top{text-align:center;margin-bottom:22px;}
  header.top .badge{
    display:inline-flex;align-items:center;gap:8px;
    color:var(--brass);
    font-size:13px;letter-spacing:2px;
    border:1px solid var(--border);
    padding:4px 14px;border-radius:99px;
    margin-bottom:14px;
  }
  header.top h1{
    font-size:34px;margin:0 0 6px;
    color:var(--text);
    font-weight:900;
  }
  header.top h1 span{color:var(--brass-bright);}
  header.top p{color:var(--text-muted);margin:0;font-size:14.5px;}

  .card{
    background:linear-gradient(180deg, var(--panel-alt), var(--panel));
    border:1px solid var(--border);
    border-radius:18px;
    padding:24px;
    margin-bottom:18px;
    box-shadow: 0 14px 40px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.03);
  }
  .card h2{
    font-size:16px;margin:0 0 16px;color:var(--brass-bright);
    display:flex;align-items:center;gap:8px;font-weight:700;
  }
  .card h2::before{content:'';width:6px;height:6px;background:var(--brass);border-radius:50%;flex:none;}

  label{display:block;font-size:13px;color:var(--text-muted);margin:0 0 6px;}
  input[type=text], input[type=number]{
    width:100%;
    background:#0F0C09;
    border:1px solid var(--border);
    color:var(--text);
    border-radius:10px;
    padding:12px 14px;
    font-size:16px;
    font-family:'Tajawal',sans-serif;
    margin-bottom:14px;
    outline:none;
    transition:border-color .15s;
  }
  input:focus{border-color:var(--brass);}
  .row2{display:flex;gap:12px;}
  .row2 > div{flex:1;}

  button{
    font-family:'Tajawal',sans-serif;
    font-weight:700;
    font-size:15px;
    border:none;
    border-radius:10px;
    padding:13px 18px;
    cursor:pointer;
    width:100%;
    transition:transform .1s, filter .15s, opacity .15s;
  }
  button:active{transform:scale(0.98);}
  button:disabled{opacity:.4;cursor:not-allowed;}
  .btn-primary{
    background:linear-gradient(180deg, var(--brass-bright), var(--brass));
    color:#1A1408;
  }
  .btn-primary:hover:not(:disabled){filter:brightness(1.08);}
  .btn-ghost{
    background:transparent;
    color:var(--brass-bright);
    border:1px solid var(--border);
  }
  .btn-ghost:hover{border-color:var(--brass);}
  .btn-row{display:flex;gap:10px;}

  .tabs{display:flex;gap:8px;margin-bottom:18px;}
  .tab{
    flex:1;text-align:center;padding:11px;border-radius:10px;
    border:1px solid var(--border);color:var(--text-muted);cursor:pointer;
    font-weight:700;font-size:14px;
  }
  .tab.active{background:var(--brass);color:#1A1408;border-color:var(--brass);}

  .code-display{
    text-align:center;padding:18px 0 6px;
  }
  .code-display .digits{
    font-size:26px;letter-spacing:2px;color:var(--brass-bright);
    word-break:break-all;line-height:1.3;padding:0 6px;
  }
  .code-display .hint{font-size:12.5px;color:var(--text-muted);margin-top:6px;}
  .copy-btn{margin-top:14px;}

  .players-list{display:flex;flex-direction:column;gap:8px;margin-bottom:6px;}
  .player-chip{
    display:flex;align-items:center;justify-content:space-between;
    background:#0F0C09;border:1px solid var(--border);
    padding:10px 14px;border-radius:10px;font-size:14.5px;
  }
  .player-chip .you{color:var(--brass-bright);font-size:12px;}
  .pulse{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--success);
    box-shadow:0 0 0 0 rgba(122,155,110,.6);animation:pulse 1.6s infinite;}
  @keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(122,155,110,.55);}
    70%{box-shadow:0 0 0 9px rgba(122,155,110,0);}
    100%{box-shadow:0 0 0 0 rgba(122,155,110,0);}
  }

  .scoreboard{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
  .score-side{text-align:center;flex:1;}
  .score-side .name{font-size:13.5px;color:var(--text-muted);margin-bottom:4px;}
  .score-side .val{font-size:26px;color:var(--brass-bright);}
  .score-side.turn .name{color:var(--brass-bright);}
  .vs{color:var(--copper);font-weight:900;font-size:13px;padding:0 12px;}
  .round-pill{
    text-align:center;font-size:12.5px;color:var(--text-muted);
    margin-bottom:16px;letter-spacing:1px;
  }

  .dial-wrap{display:flex;justify-content:center;margin:6px 0 18px;}
  svg{display:block;}
  .dial-readout{font-size:54px;color:var(--text);text-anchor:middle;font-weight:700;}
  .dial-status{font-size:13px;letter-spacing:2px;}

  .hint-banner{
    text-align:center;padding:10px;border-radius:10px;margin-bottom:16px;
    font-weight:700;font-size:15px;border:1px solid var(--border);
  }
  .hint-higher{color:var(--brass-bright);}
  .hint-lower{color:var(--copper);}
  .hint-correct{color:var(--success);border-color:rgba(122,155,110,.4);background:rgba(122,155,110,.08);}
  .hint-wait{color:var(--text-muted);}

  .history{max-height:140px;overflow-y:auto;display:flex;flex-direction:column-reverse;gap:6px;margin-top:4px;}
  .history-row{
    display:flex;justify-content:space-between;align-items:center;
    background:#0F0C09;border:1px solid var(--border);
    padding:7px 12px;border-radius:8px;font-size:13px;color:var(--text-muted);
  }
  .history-row .num{color:var(--text);font-weight:700;}
  .history-row .tag{font-size:11.5px;padding:2px 8px;border-radius:99px;}
  .tag-higher{background:rgba(240,194,75,.12);color:var(--brass-bright);}
  .tag-lower{background:rgba(181,101,29,.18);color:#D88C4B;}
  .tag-correct{background:rgba(122,155,110,.18);color:var(--success);}

  .empty-state{text-align:center;color:var(--text-muted);font-size:13.5px;padding:14px 0;}

  .finished-trophy{text-align:center;font-size:48px;margin-bottom:6px;}
  .finished-title{text-align:center;font-size:22px;font-weight:900;color:var(--brass-bright);margin-bottom:4px;}
  .finished-sub{text-align:center;color:var(--text-muted);font-size:14px;margin-bottom:18px;}

  .error-msg{color:var(--danger);font-size:13px;margin:-6px 0 12px;min-height:0;}
  .small-link{display:block;text-align:center;color:var(--text-muted);font-size:12.5px;margin-top:8px;cursor:pointer;}
  .small-link:hover{color:var(--brass-bright);}

  @media (max-width: 420px){
    .code-display .digits{font-size:20px;letter-spacing:1px;}
    header.top h1{font-size:27px;}
  }

  @keyframes confettiFall{
    0%{transform:translateY(-20px) rotate(0deg); opacity:1;}
    100%{transform:translateY(220px) rotate(540deg); opacity:0;}
  }
  .confetti-piece{
    position:absolute;top:0;width:8px;height:8px;border-radius:2px;
    animation:confettiFall 1.4s ease-in forwards;
  }
</style>
<script src="../confetti.js"></script>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="badge">🔐 غرفة سرية لشخصين</div>
    <h1>ثنائي <span>الخزنة</span></h1>
    <p>اكسر الكود قبل خصمك — العب مع صديقك من أي مكان</p>
  </header>
  <a class="small-link" href="../index.html" style="margin-bottom:14px;">→ العودة لصندوق الألعاب</a>
  <div id="app"></div>
</div>

<script src="../multiplayer.js"></script>
<script>
// ==================================================================
// Vault Duel — مع خادم WebSocket وسيط (بدون PeerJS)
// ==================================================================

let state = {
  mode: null,           // 'local' | 'remote'
  screen: 'home',      // home | local_setup | lobby | game | finished
  tab: 'create',
  myName: '',
  myRole: null,         // 'A' (host) أو 'B' (guest) — null في المحلي
  isHost: false,
  roomCode: null,
  room: null,
  secretLocal: null,
  error: '',
  busy: false,
};

function escapeHtml(s){
  return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function freshRoomConfig(min, max, rounds){
  return {
    min, max, rounds,
    players: [],
    status: 'waiting',       // waiting | setting | guessing | round_end | finished
    currentRound: 1,
    setterRole: 'A',
    guesses: [],
    attemptsThisRound: 0,
    scores: {A: 0, B: 0},
    winnerRole: null,
    secret: null,
  };
}

function nameOf(role){
  const p = state.room?.players.find(pl => pl.role === role);
  return p ? p.name : '...';
}

// ====== دوال تبادل الأدوار ======
function swapRoles(){
  if (!state.room) return;
  // تبديل setterRole
  state.room.setterRole = state.room.setterRole === 'A' ? 'B' : 'A';
  // إعادة ضبط الحالة للجولة التالية
  state.room.status = 'setting';
  state.room.secret = null;
  state.room.attemptsThisRound = 0;
  state.secretLocal = null;
  // لا نغير currentRound هنا، بل نزيده عند بدء الجولة
}

// ====== دوال إنشاء/انضمام الغرفة ======
// يتم استخدام MP.init التي تعرض الواجهة، لذا سنعتمد على دوال MP الداخلية.
// سنقوم بتعريف دوال createRoom و joinRoom باستخدام MP.requestCreate و MP.requestJoin
// لكن MP لا توفر ذلك مباشرة، لذا سنستخدم الواجهة المدمجة في MP (التي تظهر عند init)
// وسنقوم باستدعاء MP.init مع config، وسيتم عرض نافذة اختيار اللعب.
// عند اختيار "العب عن بُعد" ستظهر واجهة إنشاء/انضمام.
// لذا نحتاج فقط إلى تهيئة MP.init وإدارة الحالة المحلية.

// ====== دوال اللعبة ======
function initGame(n1, n2, min, max, rounds){
  state.room = freshRoomConfig(min, max, rounds);
  state.room.players.push({name: n1, role: 'A'});
  state.room.players.push({name: n2, role: 'B'});
  state.room.status = 'setting';
  state.secretLocal = null;
  state.error = '';
  state.screen = 'game';
  render();
}

// دوال خاصة بالوضع المحلي
function localStartGame(){
  const n1 = document.getElementById('localP1Input')?.value.trim();
  const n2 = document.getElementById('localP2Input')?.value.trim();
  const min = parseInt(document.getElementById('minInput')?.value || '1');
  const max = parseInt(document.getElementById('maxInput')?.value || '100');
  const rounds = parseInt(document.getElementById('roundsInput')?.value || '5');
  if(!n1 || !n2){ state.error = 'الرجاء إدخال اسمي اللاعبين'; render(); return; }
  if(isNaN(min) || isNaN(max) || min >= max){ state.error = 'تأكد أن الحد الأدنى أقل من الحد الأعلى'; render(); return; }
  state.mode = 'local';
  state.isHost = true;
  state.myRole = null;
  initGame(n1, n2, min, max, rounds);
}

function localSubmitSecret(){
  const val = parseInt(document.getElementById('secretInput')?.value);
  const room = state.room;
  if(isNaN(val) || val < room.min || val > room.max){
    state.error = `أدخل رقماً بين ${room.min} و ${room.max}`;
    render(); return;
  }
  state.secretLocal = val;
  room.status = 'pass_to_guesser';
  state.error = '';
  render();
}

function localProceedToGuess(){
  state.room.status = 'guessing';
  state.room.attemptsThisRound = 0;
  render();
}

function localSubmitGuess(){
  const room = state.room;
  const input = document.getElementById('guessInput');
  const val = parseInt(input?.value);
  if(isNaN(val) || val < room.min || val > room.max){
    state.error = `أدخل رقماً بين ${room.min} و ${room.max}`;
    render(); return;
  }
  room.attemptsThisRound += 1;
  const guesserRole = room.setterRole === 'A' ? 'B' : 'A';
  let hint;
  if(val === state.secretLocal) hint = 'correct';
  else if(val < state.secretLocal) hint = 'higher';
  else hint = 'lower';
  room.guesses.push({by: guesserRole, value: val, hint, round: room.currentRound});

  if(hint === 'correct'){
    room.scores[guesserRole] += room.attemptsThisRound;
    room.secret = state.secretLocal;
    if(room.currentRound >= room.rounds){
      room.status = 'finished';
      const a = room.scores.A, b = room.scores.B;
      room.winnerRole = a === b ? 'tie' : (a < b ? 'A' : 'B');
      state.screen = 'finished';
    } else {
      room.status = 'round_end';
    }
  }
  state.error = '';
  if(input) input.value = '';
  render();
}

function localNextRound(){
  // تبديل الأدوار
  swapRoles();
  state.room.currentRound += 1;
  state.room.guesses = [];
  render();
}

function localPlayAgain(){
  state.screen = 'local_setup';
  state.room = null;
  state.secretLocal = null;
  state.error = '';
  render();
}

// ====== دوال الوضع عن بُعد ======
function remoteSubmitSecret(){
  if(state.busy) return;
  const val = parseInt(document.getElementById('secretInput')?.value);
  const room = state.room;
  if(isNaN(val) || val < room.min || val > room.max){
    state.error = `أدخل رقماً بين ${room.min} و ${room.max}`;
    render(); return;
  }
  state.secretLocal = val;
  room.status = 'guessing';
  room.attemptsThisRound = 0;
  state.error = '';
  // إعلام الطرف الآخر بأن السر تم تعيينه
  // نرسل إجراء (action) لتحديث الحالة
  // سنستخدم MP.sync() بعد تغيير الحالة
  MP.sync();
  render();
}

function remoteSubmitGuess(){
  if(state.busy) return;
  const room = state.room;
  const input = document.getElementById('guessInput');
  const val = parseInt(input?.value);
  if(isNaN(val) || val < room.min || val > room.max){
    state.error = `أدخل رقماً بين ${room.min} و ${room.max}`;
    render(); return;
  }
  state.error = '';
  state.busy = true;
  // إرسال التخمين كإجراء (action) ليتم معالجته من قبل المضيف (الذي يملك السر)
  // نستخدم action 'submitGuessRemote'
  // لكننا سنقوم بمعالجة التخمين محلياً إذا كنا المضيف، وإلا نرسل إجراء للطرف الآخر.
  // بما أننا نستخدم MP، سنقوم بتعريف action 'submitGuess' التي ستقبل role و value وتنفذ المنطق.
  // لكن الأسهل: نرسل رسالة مباشرة عبر MP.send؟ لكن MP لا توفر send مباشرة.
  // بدلاً من ذلك، نستخدم actions المعرفة في MP.init.
  // سنقوم بتعريف action 'remoteGuess' في MP.init.
  // وسنقوم بتنفيذها.
  // لكننا في هذا الملف سنقوم بإرسال الإجراء عبر MP.actions.remoteGuess
  // ولكن يجب أن نضيف remoteGuess إلى actions.
  // سنقوم بذلك في MP.init.
  // لتجنب التعقيد، سنقوم بتنفيذ المنطق في المضيف فقط، والضيف يرسل إجراء.
  // سأضيف دالة handleRemoteGuess في MP.init.
  // لكن يمكننا استخدام آلية بسيطة: المضيف يستمع لإجراء 'guess' من الضيف.
  // سنقوم بتعريف action 'guess' التي تأخذ value، ويقوم المضيف بتنفيذ المنطق.
  // وسنقوم بتعريف دالة submitGuess التي ستستدعي action 'guess' عبر MP.
  // ولكن يجب أن نمرر role (من قام بالتخمين).
  // سنقوم بتعريف action 'guess' التي تأخذ by و value.
  // سيتم تنفيذها من قبل المضيف فقط (أو من قبل أي طرف لكن مع تحقق).
  // سأضيف المنطق في MP.init.
  // بما أننا نستخدم MP، يمكننا استخدام `MP.actions.guess` إذا عرفناها.
  // لذلك سأقوم بتعريف `guess` action.
  // سأقوم بتنفيذها هنا:
  window.guess = function(by, value){
    // يتم تنفيذها من قبل الطرف الذي يستقبل الإجراء (المضيف)
    const room = state.room;
    if(room.status !== 'guessing') return;
    if(state.busy) return;
    state.busy = true;
    room.attemptsThisRound += 1;
    let hint;
    if(value === state.secretLocal) hint = 'correct';
    else if(value < state.secretLocal) hint = 'higher';
    else hint = 'lower';
    room.guesses.push({by, value, hint, round: room.currentRound});
    if(hint === 'correct'){
      room.scores[by] += room.attemptsThisRound;
      room.secret = state.secretLocal;
      if(room.currentRound >= room.rounds){
        room.status = 'finished';
        const a = room.scores.A, b = room.scores.B;
        room.winnerRole = a === b ? 'tie' : (a < b ? 'A' : 'B');
        state.screen = 'finished';
      } else {
        room.status = 'round_end';
      }
    }
    state.busy = false;
    // مزامنة الحالة مع الطرف الآخر
    MP.sync();
    render();
  };

  // الآن دالة submitGuess للضيف:
  function submitGuessRemote(){
    if(state.busy || state.room.status !== 'guessing') return;
    const input = document.getElementById('guessInput');
    const val = parseInt(input?.value);
    if(isNaN(val) || val < state.room.min || val > state.room.max){
      state.error = `أدخل رقماً بين ${state.room.min} و ${state.room.max}`;
      render(); return;
    }
    state.error = '';
    // إرسال الإجراء
    // نستدعي action 'guess' مع role و value
    // يجب أن نمرر role الخاص باللاعب الحالي
    // نستخدم MP.actions.guess إذا كانت معرفة
    if (MP.actions && MP.actions.guess) {
      MP.actions.guess(state.myRole, val);
    } else {
      // fallback: إرسال عبر WebSocket مباشرة (غير موصى به)
      console.warn('MP.actions.guess غير معرف');
    }
    if(input) input.value = '';
  }

  // نربط الدالة العامة
  window.submitGuessRemote = submitGuessRemote;
}

// ====== دوال عامة للوضع البعيد ======
function remoteNextRound(){
  if(state.busy) return;
  state.busy = true;
  if(state.isHost){
    // المضيف يبدل الأدوار ويزيد الجولة
    swapRoles();
    state.room.currentRound += 1;
    state.room.guesses = [];
    state.busy = false;
    MP.sync();
    render();
  } else {
    // الضيف يطلب من المضيف تبديل الأدوار
    MP.requestSwapRoles();
    // بعد استلام swap_roles، سينفذ المضيف التبديل ويرسل المزامنة
    // وسيتم تحديث الحالة عبر setState
  }
}

// ====== دوال العرض ======
function renderSetup(){
  // اختيار طريقة اللعب (محلي أو عن بُعد) يتم عن طريق MP.init
  // ولكننا سنعرض واجهة الإعداد المحلي
  return `
  <div class="card">
    <h2>إعداد اللعبة المحلية</h2>
    <label>اللاعب الأول (A)</label>
    <input type="text" id="localP1Input" placeholder="اللاعب الأول">
    <label>اللاعب الثاني (B)</label>
    <input type="text" id="localP2Input" placeholder="اللاعب الثاني">
    <div class="row2">
      <div>
        <label>الحد الأدنى</label>
        <input type="number" id="minInput" value="1">
      </div>
      <div>
        <label>الحد الأعلى</label>
        <input type="number" id="maxInput" value="100">
      </div>
    </div>
    <label>عدد الجولات</label>
    <input type="number" id="roundsInput" value="5" min="1" max="20">
    ${state.error ? `<div class="error-msg">${escapeHtml(state.error)}</div>` : ''}
    <button class="btn-primary" onclick="localStartGame()">ابدأ اللعب 🎮</button>
  </div>
  `;
}

function renderGame(){
  const room = state.room;
  const guesserRole = room.setterRole === 'A' ? 'B' : 'A';

  let body = '';
  if(room.status === 'setting'){
    // من هو المُعد؟
    const setterIsMe = (state.mode === 'local') ? true : (state.myRole === room.setterRole);
    if(setterIsMe){
      body = `
      <div class="card">
        <h2>دورك — اختر رقماً سرياً</h2>
        <p style="color:var(--text-muted);font-size:13.5px;margin-top:-8px;">سيحاول ${escapeHtml(nameOf(guesserRole))} تخمين رقمك بين ${room.min} و ${room.max}</p>
        <input type="number" id="secretInput" placeholder="رقمك السري" min="${room.min}" max="${room.max}">
        ${state.error ? `<div class="error-msg">${escapeHtml(state.error)}</div>` : ''}
        <button class="btn-primary" onclick="${state.mode==='local'?'localSubmitSecret()':'remoteSubmitSecret()'}">تأكيد الرقم 🔒</button>
      </div>
      `;
    } else {
      body = `
      <div class="card">
        <h2>بانتظار الخصم</h2>
        <div class="empty-state">${escapeHtml(nameOf(room.setterRole))} يختار رقماً سرياً الآن... 🔐</div>
      </div>
      `;
    }
  } else if(room.status === 'pass_to_guesser' && state.mode === 'local'){
    body = `
    <div class="card">
      <div style="text-align:center;padding:20px 10px;">
        <div style="font-size:48px;margin-bottom:10px;">📱➡️</div>
        <h2 style="justify-content:center;">مرّر الجهاز الآن</h2>
        <p style="color:var(--text-muted);font-size:13.5px;">سلّم الجهاز لـ ${escapeHtml(nameOf(guesserRole))}</p>
        <button class="btn-primary" onclick="localProceedToGuess()">أنا ${escapeHtml(nameOf(guesserRole))}، جاهز ▶</button>
      </div>
    </div>
    `;
  } else if(room.status === 'guessing' || room.status === 'round_end'){
    const roundGuesses = room.guesses.filter(g => g.round === room.currentRound);
    const lastGuess = roundGuesses[roundGuesses.length - 1];
    let hintBanner = '';
    if(room.status === 'round_end' && lastGuess){
      const winnerName = nameOf(guesserRole);
      hintBanner = `<div class="hint-banner hint-correct">🎉 ${escapeHtml(winnerName)} خمّن الرقم الصحيح (${room.secret}) خلال ${room.attemptsThisRound} محاولة!</div>`;
    } else if(lastGuess){
      if(lastGuess.hint === 'higher') hintBanner = `<div class="hint-banner hint-higher">⬆ الرقم السري أكبر من ${lastGuess.value}</div>`;
      else if(lastGuess.hint === 'lower') hintBanner = `<div class="hint-banner hint-lower">⬇ الرقم السري أصغر من ${lastGuess.value}</div>`;
    } else {
      hintBanner = `<div class="hint-banner hint-wait">ابدأ التخمين!</div>`;
    }

    // تحديد من المخمن
    const guesserIsMe = (state.mode === 'local') ? true : (state.myRole === guesserRole);
    body = `
      <div class="card">
        <div class="dial-wrap">${dialSVG(room)}</div>
        ${hintBanner}
        ${room.status === 'guessing' ? (guesserIsMe ? `
          <input type="number" id="guessInput" placeholder="خمّن رقماً بين ${room.min} و ${room.max}" min="${room.min}" max="${room.max}" ${state.busy?'disabled':''}>
          ${state.error ? `<div class="error-msg">${escapeHtml(state.error)}</div>` : ''}
          <button class="btn-primary" onclick="${state.mode==='local'?'localSubmitGuess()':'submitGuessRemote()'}" ${state.busy?'disabled':''}>${state.busy ? 'جارٍ الإرسال...' : 'إرسال التخمين 🎯'}</button>
        ` : `<div class="empty-state">بانتظار تخمين ${escapeHtml(nameOf(guesserRole))}...</div>`) : ''}
        ${room.status === 'round_end' ? `
          <button class="btn-primary" onclick="${state.mode==='local'?'localNextRound()':'remoteNextRound()'}" ${state.busy?'disabled':''}>${state.busy ? 'جارٍ التحميل...' : 'الجولة التالية ➡'}</button>
        ` : ''}
      </div>
      <div class="card">
        <h2>سجل المحاولات</h2>
        <div class="history">
          ${roundGuesses.length ? roundGuesses.map(g => `
            <div class="history-row">
              <span class="num digits">${g.value}</span>
              <span class="tag ${g.hint==='correct'?'tag-correct':g.hint==='higher'?'tag-higher':'tag-lower'}">
                ${g.hint==='correct' ? 'صحيح ✅' : g.hint==='higher' ? 'أكبر ⬆' : 'أصغر ⬇'}
              </span>
            </div>
          `).reverse().join('') : `<div class="empty-state">لا توجد محاولات بعد</div>`}
        </div>
      </div>
    `;
  }

  return `
    <div class="card">
      <div class="round-pill">الجولة ${room.currentRound} من ${room.rounds}</div>
      <div class="scoreboard">
        <div class="score-side ${state.myRole==='A'?'turn':''}">
          <div class="name">${escapeHtml(nameOf('A'))}${state.myRole==='A'?' (أنت)':''}</div>
          <div class="val digits">${room.scores.A}</div>
        </div>
        <div class="vs">VS</div>
        <div class="score-side ${state.myRole==='B'?'turn':''}">
          <div class="name">${escapeHtml(nameOf('B'))}${state.myRole==='B'?' (أنت)':''}</div>
          <div class="val digits">${room.scores.B}</div>
        </div>
      </div>
    </div>
    ${body}
    <div class="small-link" onclick="leaveGame()">مغادرة اللعبة</div>
  `;
}

function dialSVG(room){
  const min = room.min, max = room.max;
  const lastGuess = [...room.guesses].reverse().find(g => g.round === room.currentRound);
  let frac = 0.5;
  let readout = '?';
  let statusColor = 'var(--text-muted)';
  if(lastGuess){
    frac = (lastGuess.value - min) / (max - min);
    readout = lastGuess.value;
    if(lastGuess.hint === 'correct') statusColor = 'var(--success)';
    else statusColor = 'var(--brass-bright)';
  }
  const startAngle = -225, endAngle = 45;
  const angle = startAngle + frac * (endAngle - startAngle);
  const rad = angle * Math.PI / 180;
  const cx = 140, cy = 140, r = 105;
  const nx = cx + r * Math.cos(rad);
  const ny = cy + r * Math.sin(rad);

  let ticks = '';
  for(let i=0;i<=10;i++){
    const ta = startAngle + (i/10) * (endAngle - startAngle);
    const tr = ta * Math.PI/180;
    const r1 = 122, r2 = i%5===0 ? 108 : 114;
    const x1 = cx + r1*Math.cos(tr), y1 = cy + r1*Math.sin(tr);
    const x2 = cx + r2*Math.cos(tr), y2 = cy + r2*Math.sin(tr);
    ticks += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="var(--brass)" stroke-width="${i%5===0?2:1}" opacity="${i%5===0?0.8:0.35}"/>`;
  }

  return `
  <svg viewBox="0 0 280 280" width="240" height="240">
    <circle cx="140" cy="140" r="132" fill="none" stroke="var(--border)" stroke-width="1"/>
    <circle cx="140" cy="140" r="100" fill="#0F0C09" stroke="var(--brass)" stroke-width="1.5" opacity="0.5"/>
    ${ticks}
    <text x="140" y="135" text-anchor="middle" class="dial-readout digits" fill="${statusColor}">${readout}</text>
    <text x="140" y="160" text-anchor="middle" class="dial-status" fill="var(--text-muted)">${min} – ${max}</text>
    <line x1="${cx}" y1="${cy}" x2="${nx}" y2="${ny}" stroke="var(--copper)" stroke-width="3" stroke-linecap="round"/>
    <circle cx="${cx}" cy="${cy}" r="6" fill="var(--brass-bright)"/>
  </svg>
  `;
}

function renderFinished(){
  const room = state.room;
  let title, sub;
  if(room.winnerRole === 'tie'){
    title = 'تعادل مثير! 🤝';
    sub = `كلاكما سجّل ${room.scores.A} محاولة إجمالية`;
  } else {
    const winnerName = nameOf(room.winnerRole);
    title = `${winnerName} يفتح الخزنة! 🏆`;
    sub = `بمجموع ${room.scores[room.winnerRole]} محاولة مقابل ${room.scores[room.winnerRole==='A'?'B':'A']}`;
  }
  return `
  <div class="card">
    <div class="finished-trophy">🔓</div>
    <div class="finished-title">${escapeHtml(title)}</div>
    <div class="finished-sub">${escapeHtml(sub)}</div>
    <div class="scoreboard">
      <div class="score-side">
        <div class="name">${escapeHtml(nameOf('A'))}</div>
        <div class="val digits">${room.scores.A}</div>
      </div>
      <div class="vs">VS</div>
      <div class="score-side">
        <div class="name">${escapeHtml(nameOf('B'))}</div>
        <div class="val digits">${room.scores.B}</div>
      </div>
    </div>
    <button class="btn-primary" onclick="${state.mode==='local'?'localPlayAgain()':'leaveGame()'}" style="margin-top:14px;">${state.mode==='local'?'لعبة جديدة 🔁':'العودة للقائمة'}</button>
  </div>
  <div class="small-link" onclick="leaveGame()">مغادرة اللعبة</div>
  `;
}

function render(){
  const app = document.getElementById('app');
  if(!app) return;
  let html = '';
  if(!state.mode || state.screen === 'home'){
    // إذا لم يتم اختيار وضع بعد، يتم عرض واجهة MP (يتم التعامل معها بواسطة MP.init)
    // ولكننا سنعرض واجهة الإعداد المحلي إذا كان المستخدم قد اختار local
    if(state.mode === null){
      // نعرض رسالة: سيتم عرض نافذة اختيار اللعب من MP
      html = `<div class="card"><div class="empty-state">جارٍ تحميل واجهة اختيار اللعب...</div></div>`;
    }
  } else if(state.screen === 'local_setup'){
    html = renderSetup();
  } else if(state.screen === 'game'){
    html = renderGame();
  } else if(state.screen === 'finished'){
    html = renderFinished();
  }
  app.innerHTML = html;
}

// ====== دوال الخروج ======
function leaveGame(){
  // إعادة تعيين الحالة
  state = {
    mode: null,
    screen: 'home',
    tab: 'create',
    myName: '',
    myRole: null,
    isHost: false,
    roomCode: null,
    room: null,
    secretLocal: null,
    error: '',
    busy: false,
  };
  render();
  // إعادة تهيئة MP (سيتم عرض نافذة الاختيار)
  // لكن MP.init قد تم استدعاؤها مسبقاً، لا داعي لإعادة التهيئة.
  // فقط نعرض واجهة الاختيار من خلال استدعاء MP.showChoiceModal إذا كانت متاحة.
  // ولكن MP لا توفر ذلك، لذا سنقوم بإعادة تحميل الصفحة أو عرض زر للعودة.
  // بدلاً من ذلك، سنقوم بتحديث الصفحة.
  location.reload();
}

// ====== تهيئة اللعبة مع MP ======
MP.init({
  getState: () => state,
  setState: (incoming) => {
    // تحديث الحالة من المزامنة
    state = incoming;
    render();
  },
  actions: {
    // إجراءات يمكن استدعاؤها عن بُعد
    guess: (by, value) => {
      // يتم تنفيذها من قبل المضيف
      const room = state.room;
      if(room.status !== 'guessing' || state.busy) return;
      state.busy = true;
      room.attemptsThisRound += 1;
      let hint;
      if(value === state.secretLocal) hint = 'correct';
      else if(value < state.secretLocal) hint = 'higher';
      else hint = 'lower';
      room.guesses.push({by, value, hint, round: room.currentRound});
      if(hint === 'correct'){
        room.scores[by] += room.attemptsThisRound;
        room.secret = state.secretLocal;
        if(room.currentRound >= room.rounds){
          room.status = 'finished';
          const a = room.scores.A, b = room.scores.B;
          room.winnerRole = a === b ? 'tie' : (a < b ? 'A' : 'B');
          state.screen = 'finished';
        } else {
          room.status = 'round_end';
        }
      }
      state.busy = false;
      MP.sync();
      render();
    },
    // إجراء لبدء الجولة التالية (يطلبه الضيف)
    nextRoundRequest: () => {
      // ينفذها المضيف
      if(state.isHost){
        swapRoles();
        state.room.currentRound += 1;
        state.room.guesses = [];
        state.busy = false;
        MP.sync();
        render();
      }
    }
  },
  swapRoles: () => {
    // يتم استدعاؤها عند استلام رسالة swap_roles من الطرف الآخر
    if(state.mode === 'remote' && !state.isHost){
      // الضيف يستقبل طلب التبديل من المضيف (أو العكس)
      // نقوم بتنفيذ التبديل
      swapRoles();
      state.room.currentRound += 1;
      state.room.guesses = [];
      state.busy = false;
      render();
    }
  },
  onStart: (mode, isHost, myName, peerName) => {
    state.mode = mode;
    state.isHost = isHost;
    state.myName = myName;
    if(mode === 'local'){
      // الوضع المحلي: نعرض واجهة الإعداد
      state.screen = 'local_setup';
      render();
    } else {
      // الوضع البعيد
      state.myRole = isHost ? 'A' : 'B';
      if(isHost){
        // المضيف يبدأ اللعبة
        // نطلب من المستخدم إدخال الإعدادات
        // سنعرض واجهة إعدادات البعيد (مشابهة للمحلي ولكن بدون أسماء)
        // يمكننا استخدام نفس واجهة local_setup ولكن مع إخفاء حقول الأسماء
        // ونضبط الأسماء من myName و peerName
        const n1 = myName;
        const n2 = peerName;
        // نطلب الإعدادات من المستخدم عبر مربع حوار بسيط
        const min = parseInt(prompt('الحد الأدنى', '1'));
        const max = parseInt(prompt('الحد الأعلى', '100'));
        const rounds = parseInt(prompt('عدد الجولات', '5'));
        if(isNaN(min) || isNaN(max) || min >= max || isNaN(rounds)){
          alert('إعدادات غير صالحة، سيتم استخدام القيم الافتراضية 1-100 و 5 جولات');
          initGame(n1, n2, 1, 100, 5);
        } else {
          initGame(n1, n2, min, max, rounds);
        }
        // بعد initGame، نرسل المزامنة
        MP.sync();
      } else {
        // الضيف ينتظر استلام الحالة من المضيف
        // سيتم تحديث الحالة عبر setState
        state.screen = 'game';
        render();
      }
    }
  }
});

// ربط الدوال العامة
window.localStartGame = localStartGame;
window.localSubmitSecret = localSubmitSecret;
window.localProceedToGuess = localProceedToGuess;
window.localSubmitGuess = localSubmitGuess;
window.localNextRound = localNextRound;
window.localPlayAgain = localPlayAgain;
window.remoteSubmitSecret = remoteSubmitSecret;
window.remoteSubmitGuess = remoteSubmitGuess;
window.remoteNextRound = remoteNextRound;
window.leaveGame = leaveGame;
window.submitGuessRemote = submitGuessRemote; // للضيف

// دالة guess تستخدم للإجراءات
window.guess = function(by, value){ /* يتم تعريفها داخل remoteSubmitGuess */ };

// بدء العرض
render();
</script>
